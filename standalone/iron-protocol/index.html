<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Iron Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a0f;color:#e8e8f0;font-family:'DM Mono','Courier New',monospace;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
input,textarea,select{color-scheme:dark;font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}

/* App container */
.app{max-width:520px;margin:0 auto;padding-bottom:80px}

/* Header */
.hdr{background:linear-gradient(135deg,#0d0d1a,#111128);border-bottom:1px solid #1a1a2e;padding:16px 16px 12px;position:sticky;top:0;z-index:100}
.pulse{width:7px;height:7px;border-radius:50%;background:#00b4d8;box-shadow:0 0 8px #00b4d8;animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* Tabs */
.tabs{display:flex;background:#0a0a0f;border-bottom:1px solid #1a1a2e;position:sticky;top:74px;z-index:99;overflow-x:auto}
.tabs::-webkit-scrollbar{height:0}
.tab{flex:none;padding:11px 9px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#444;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:#e8e8f0;border-bottom-color:#00b4d8}

/* Sections & Cards */
.sec{padding:13px 13px 0}
.card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.card:active{transform:scale(.99)}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:8px;letter-spacing:1px;text-transform:uppercase}

/* Info & Warning bars */
.wbar{background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.2);border-radius:10px;padding:10px 12px;margin-bottom:11px;font-size:11px;line-height:1.6}
.ibar{background:rgba(0,180,216,.07);border:1px solid rgba(0,180,216,.2);border-radius:10px;padding:10px 12px;margin-bottom:11px;font-size:11px;line-height:1.6}
.sbar{background:rgba(56,176,0,.07);border:1px solid rgba(56,176,0,.2);border-radius:10px;padding:10px 12px;margin-bottom:11px;font-size:11px;line-height:1.6}

/* Stat boxes */
.sbox{background:#111;border-radius:8px;padding:7px 10px}
.slbl{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:1px}
.sval{font-size:12px;color:#ccc;margin-top:2px}

/* Checkmarks */
.chk{width:32px;height:32px;border-radius:8px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s}

/* Expandable panels */
.panel{font-size:11px;line-height:1.7;color:#999;background:#0a0a14;border-radius:0 0 10px 10px;padding:13px;border:1px solid #1a1a2e;border-top:none;margin-bottom:8px}

/* Day buttons */
.daybtn{padding:5px 8px;font-size:9px;text-transform:uppercase;letter-spacing:1px;border-radius:5px;border:1px solid #222;background:#111;color:#555;transition:all .15s}
.daybtn.on{background:rgba(76,201,240,.15);border-color:#4cc9f0;color:#4cc9f0}
.daybtn.today{outline:1px solid #666;outline-offset:2px}

/* Inputs */
input[type=date],input[type=time],input[type=text],input[type=number],input[type=search]{background:#111;border:1px solid #222;border-radius:6px;padding:5px 8px;color:#ccc;font-size:11px}
input[type=search]{width:100%;padding:8px 10px;font-size:12px;border-radius:8px;margin-bottom:10px}
input[type=search]::placeholder{color:#444}
textarea{background:#111;border:1px solid #222;border-radius:8px;padding:8px 10px;color:#ccc;font-size:11px;width:100%;resize:none;line-height:1.5}
select{background:#111;border:1px solid #222;border-radius:6px;padding:5px 8px;color:#ccc;font-size:11px}

/* Adjustment buttons (dose/weight/rep controls) */
.adj{width:30px;height:30px;border-radius:7px;background:#1a1a1a;border:1px solid #2a2a2a;color:#bbb;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1;transition:background .1s}
.adj:disabled{opacity:.3;pointer-events:none}
.adj:not(:disabled):active{background:#2a2a2a}
.dinput{width:60px;background:#111;border:1px solid #333;border-radius:6px;padding:4px 6px;color:#ccc;font-size:12px;text-align:center}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.finput{background:#111;border:1px solid #222;border-radius:8px;padding:8px 10px;color:#ccc;font-size:12px;width:100%;margin-bottom:10px}
.flabel{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block}

/* Buttons */
.btn-pri{background:#00b4d8;color:#000;padding:9px 16px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:100%;margin-top:6px}
.btn-pri:active{opacity:.8}
.btn-sec{background:#1a1a2e;color:#888;padding:8px 16px;border-radius:8px;font-size:11px;cursor:pointer;width:100%;margin-top:6px;border:1px solid #2a2a2e}
.btn-danger{background:rgba(255,68,68,.15);color:#ff4444;padding:8px 16px;border-radius:8px;font-size:11px;cursor:pointer;width:100%;margin-top:6px;border:1px solid rgba(255,68,68,.3)}

/* Segmented control */
.seg{display:flex;background:#111;border-radius:8px;overflow:hidden;margin-bottom:10px}
.seg-btn{flex:1;padding:7px 4px;font-size:10px;text-align:center;cursor:pointer;color:#555;border:none;transition:all .15s}
.seg-btn.on{background:#1a1a2e;color:#e0e0f0}

/* Rings */
.ring{transform:rotate(-90deg)}

/* Animations */
@keyframes sIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sIn{animation:sIn .2s ease}
@keyframes prCelebrate{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

/* Rest timer bar (fixed at bottom during workout) */
.timer-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:linear-gradient(180deg,#0d0d1acc,#0d0d1a);border-top:1px solid #1a1a2e;padding:10px 16px;display:flex;align-items:center;gap:12px;max-width:520px;margin:0 auto}
.timer-ring-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
.timer-ring-wrap .timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#e0e0f0}

/* Muscle group color dots */
.mdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* Exercise search results */
.ex-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0d0d1a;border:1px solid #1a1a2e;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.ex-row:active{border-color:#00b4d833}

/* Set row during workout */
.set-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid #111}
.set-row:last-child{border-bottom:none}
.set-num{width:20px;font-size:10px;color:#444;text-align:center;flex-shrink:0}
.set-type{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:1px}

/* Progress bar */
.pbar{background:#111;border-radius:3px;height:5px;overflow:hidden}
.pbar-fill{height:5px;border-radius:3px;transition:width .4s}

/* Filter chips */
.chip{display:inline-block;padding:4px 8px;border-radius:5px;font-size:9px;letter-spacing:1px;text-transform:uppercase;border:1px solid #222;color:#555;cursor:pointer;transition:all .15s;margin:0 4px 4px 0}
.chip.on{background:rgba(0,180,216,.15);border-color:#00b4d8;color:#00b4d8}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:#333;font-size:12px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
      <div class="pulse"></div>
      <span style="font-size:9px;letter-spacing:3px;color:#555;text-transform:uppercase">Iron Protocol</span>
    </div>
    <div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#f0f0ff">Workout Tracker</div>
    <div id="hdate" style="font-size:10px;color:#555;margin-top:1px"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="go('workout')" id="t-workout">💪 Workout</button>
    <button class="tab" onclick="go('history')" id="t-history">📅 History</button>
    <button class="tab" onclick="go('exercises')" id="t-exercises">📖 Exercises</button>
    <button class="tab" onclick="go('progress')" id="t-progress">📊 Progress</button>
    <button class="tab" onclick="go('templates')" id="t-templates">📝 Templates</button>
    <button class="tab" onclick="go('body')" id="t-body">⚖️ Body</button>
  </div>
  <div id="main"></div>
</div>
<div id="modal-root"></div>
<div id="timer-root"></div>

<script src="exercise-db.js"></script>
<script src="app.js"></script>
</body>
</html>
