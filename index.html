<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Excalibur OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/modules.css">
</head>
<body>
<div class="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
      <div class="pulse"></div>
      <span style="font-size:9px;letter-spacing:3px;color:#555;text-transform:uppercase">Excalibur OS</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#f0f0ff" id="hdr-title">Dashboard</div>
      <button onclick="EXC.openSettings()" style="background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;color:#aaa;font-size:14px;padding:6px 10px;cursor:pointer" title="Settings">&#9881;</button>
    </div>
    <div id="hdate" style="font-size:10px;color:#555;margin-top:1px"></div>
  </div>
  <div class="tabs" id="sub-tabs"></div>
  <div id="main"></div>
</div>

<div id="modal-root"></div>
<div id="timer-root"></div>
<div id="toast" class="toast"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" onclick="EXC.go('dashboard')" data-section="dashboard">
    <span class="nav-icon">&#127968;</span>Hub
  </button>
  <button class="nav-btn" onclick="EXC.go('supplements')" data-section="supplements">
    <span class="nav-icon">&#128138;</span>Supps
  </button>
  <button class="nav-btn" onclick="EXC.go('workout')" data-section="workout">
    <span class="nav-icon">&#127947;</span>Train
  </button>
  <button class="nav-btn" onclick="EXC.go('habits')" data-section="habits">
    <span class="nav-icon">&#9989;</span>Habits
  </button>
  <button class="nav-btn" onclick="EXC.go('insights')" data-section="insights">
    <span class="nav-icon">&#128200;</span>Insights
  </button>
</nav>

<!-- Data files (no dependencies) -->
<script src="js/data/supplement-db.js"></script>
<script src="js/data/supplement-builtin.js"></script>
<script src="js/data/exercise-db.js"></script>
<script src="js/data/practice-db.js"></script>
<script src="js/data/cross-rules.js"></script>
<script src="js/data/science-rules.js"></script>

<!-- Core infrastructure -->
<script src="js/utils.js"></script>
<script src="js/events.js"></script>
<script src="js/state.js"></script>
<script src="js/router.js"></script>

<!-- Feature modules -->
<script src="js/modules/recovery.js"></script>
<script src="js/modules/supplements.js"></script>
<script src="js/modules/workout.js"></script>
<script src="js/modules/habits.js"></script>
<script src="js/modules/practice.js"></script>
<script src="js/modules/wearable.js"></script>
<script src="js/modules/ai-coach.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/insights.js"></script>
</body>
</html>
